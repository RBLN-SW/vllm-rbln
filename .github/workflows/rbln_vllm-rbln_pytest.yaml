name: vllm-rbln / PR / Pytest

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "ref to checkout"
        required: false
        type: string
      pr_number:
        description: "PR number to run"
        required: false
        type: string
      rebel_compiler_version:
        description: "Version of rebel-compiler to use (optional)"
        required: false
        type: string
      optimum_rbln_version:
        description: "Version of optimum-rbln to use (optional)"
        required: false
        type: string
      fail_fast:
        description: "Whether to fail fast when one matrix job fails"
        required: false
        type: boolean
        default: true
      test_level:
        description: "Test level for VLLM_RBLN_TEST_LEVEL environment variable"
        required: false
        type: string
  workflow_call:
    inputs:
      ref:
        description: "ref to checkout"
        required: false
        type: string
      fail_fast:
        description: "Whether to fail fast when one matrix job fails"
        required: false
        type: boolean
        default: true
      rebel_compiler_version:
        description: "Version of rebel-compiler to use (optional)"
        required: false
        type: string
      optimum_rbln_version:
        description: "Version of optimum-rbln to use (optional)"
        required: false
        type: string
      test_level:
        description: "Test level for VLLM_RBLN_TEST_LEVEL environment variable"
        required: false
        type: string

jobs:
  pytest:
    name: Pytest (${{ matrix.test_type.name }})
    runs-on: ${{ matrix.test_type.runner }}
    strategy:
      fail-fast: ${{ inputs.fail_fast }}
      matrix:
        test_type: 
          [
            {
              name : "core",
              runner : "rbln-sw-k8s-general"
            },
            {
              name : "worker",
              runner : "rbln-sw-k8s-general"
            },
            {
              name : "optimum_compile",
              runner : "rbln-sw-k8s-general"
            },
          ]
    steps:
      - name: Checkout the vllm-rbln repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/merge', inputs.pr_number) || (inputs.ref != '' && inputs.ref) || github.sha }}
          submodules: recursive
          fetch-depth: 0

      - name: Get commit message
        id: get_commit_message
        run: |
          if git rev-parse HEAD^2 >/dev/null 2>&1; then
            COMMIT_MESSAGE=$(git log -1 --pretty=%B HEAD^2)
          else
            COMMIT_MESSAGE=$(git log -1 --pretty=%B)
          fi
          echo "Commit message: $COMMIT_MESSAGE"
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check if test should be skipped
        id: should_skip
        env:
          COMMIT_MESSAGE: ${{ steps.get_commit_message.outputs.message }}
        run: |
          SKIP=false

          case "${{ matrix.test_type.name }}" in
            "core")
              if [[ "$COMMIT_MESSAGE" == *"[skip core]"* ]]; then
                SKIP=true
              fi
              ;;
            "worker")
              if [[ "$COMMIT_MESSAGE" == *"[skip worker]"* ]]; then
                SKIP=true
              fi
              ;;
            "optimum_compile")
              if [[ "$COMMIT_MESSAGE" == *"[skip optimum_compile]"* ]]; then
                SKIP=true
              fi
              ;;
            "models")
              if [[ "$COMMIT_MESSAGE" == *"[skip models]"* ]]; then
                SKIP=true
              fi
              ;;
          esac

          echo "skip=$SKIP" >> $GITHUB_OUTPUT
          echo "Skip decision: $SKIP"

      - name: Install uv
        if: steps.should_skip.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v5

      - name: Install build-essential
        if: steps.should_skip.outputs.skip != 'true'
        run: |
          for i in {1..3}; do
            sudo apt-get update && break || sleep 10
          done
          sudo apt-get install -y build-essential

      - name: Create test environment via uv sync
        if: steps.should_skip.outputs.skip != 'true'
        env:
          UV_INDEX_RBLN_NEXUS_NIGHTLY_USERNAME: ${{ secrets.UDC_NEXUS_USERNAME }}
          UV_INDEX_RBLN_NEXUS_NIGHTLY_PASSWORD: ${{ secrets.UDC_NEXUS_PASSWORD }}
          UV_INDEX_REBELLIONS_USERNAME: ${{ secrets.REBEL_PYPI_USERNAME }}
          UV_INDEX_REBELLIONS_PASSWORD: ${{ secrets.REBEL_PYPI_PASSWORD }}
        run: |
          if [ -z "$UV_INDEX_RBLN_NEXUS_NIGHTLY_USERNAME" ] || [ -z "$UV_INDEX_REBELLIONS_USERNAME" ]; then
            echo "::error::UDC_NEXUS_USERNAME/PASSWORD and REBEL_PYPI_USERNAME/PASSWORD secrets not available to this repo — add repo/org secrets (LDAP account)"
            exit 1
          fi
          uv sync --locked --python 3.12 --extra test --extra dev
          # rebel-compiler version override (escape hatch)
          if [ -n "${{ inputs.rebel_compiler_version }}" ]; then
            uv pip install --no-deps "rebel-compiler==${{ inputs.rebel_compiler_version }}" --extra-index-url "${{ secrets.DEV_PKG_URL }}"
          fi
          # optimum-rbln version override (escape hatch)
          if [ -n "${{ inputs.optimum_rbln_version }}" ]; then
            uv pip install --no-deps "optimum-rbln==${{ inputs.optimum_rbln_version }}"
          fi

      - name: Run pytest
        if: steps.should_skip.outputs.skip != 'true'
        env:
          REBEL_VLLM_PRE_COMPILED_DIR: ${{ secrets.VLLM_PRE_COMPILED_DIR }}

        run: |
          case "${{ matrix.test_type.name }}" in
            "core")
              uv run --no-sync pytest tests/v1/core -vv --durations 0
              ;;
            "worker")
              uv run --no-sync pytest tests/v1/worker/test_rebel_optimum_model_runner.py -vv --durations 0
              ;;
            "optimum_compile")
              uv run --no-sync pytest tests/optimum_compile -vv --durations 0
              ;;
          esac

      - name: Skip message
        if: steps.should_skip.outputs.skip == 'true'
        run: |
          echo "Found [skip-${{ matrix.test_type.name }}] in commit message, skipping CI"

  pytest-arc:
    name: Pytest (${{ matrix.test_type.name }})
    runs-on: ${{ matrix.test_type.runner }}
    container:
      image: mcr.microsoft.com/devcontainers/python:3.12
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: ${{ inputs.fail_fast }}
      matrix:
        test_type:
          [
            {
              name : "openai",
              runner : "rbln-sw-k8s-ca22-4"
            },
            {
              name : "llm",
              runner : "rbln-sw-k8s-ca22-1"
            },
            {
              name : "sampler",
              runner : "rbln-sw-k8s-ca22-1"
            },
            {
              name : "models",
              runner : "rbln-sw-k8s-ca22-1"
            },
          ]
    steps:
      - name: Checkout the vllm-rbln repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/merge', inputs.pr_number) || (inputs.ref != '' && inputs.ref) || github.sha }}
          submodules: recursive
          fetch-depth: 0

      - name: Fix git ownership
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Get commit message
        id: get_commit_message
        run: |
          if git rev-parse HEAD^2 >/dev/null 2>&1; then
            COMMIT_MESSAGE=$(git log -1 --pretty=%B HEAD^2)
          else
            COMMIT_MESSAGE=$(git log -1 --pretty=%B)
          fi
          echo "Commit message: $COMMIT_MESSAGE"
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check if test should be skipped
        id: should_skip
        env:
          COMMIT_MESSAGE: ${{ steps.get_commit_message.outputs.message }}
        run: |
          SKIP=false
          
          case "${{ matrix.test_type.name }}" in
            "openai")
              if [[ "$COMMIT_MESSAGE" == *"[skip openai]"* ]]; then
                SKIP=true
              fi
              ;;
            "llm")
              if [[ "$COMMIT_MESSAGE" == *"[skip llm]"* ]]; then
                SKIP=true
              fi
              ;;
            "sampler")
              if [[ "$COMMIT_MESSAGE" == *"[skip worker]"* ]]; then
                SKIP=true
              fi
              ;;
            "models")
              if [[ "$COMMIT_MESSAGE" == *"[skip models]"* ]]; then
                SKIP=true
              fi
              ;;
          esac
          
          echo "skip=$SKIP" >> $GITHUB_OUTPUT

      - name: Install uv CLI
        if: steps.should_skip.outputs.skip != 'true'
        run: |
          pip install uv

      - name: Install build-essential
        if: steps.should_skip.outputs.skip != 'true'
        run: |
          for i in {1..3}; do
            apt-get update && break || sleep 10
          done
          apt-get install -y build-essential

      - name: Create test environment via uv sync
        if: steps.should_skip.outputs.skip != 'true'
        uses: nick-fields/retry@v3
        env:
          UV_INDEX_RBLN_NEXUS_NIGHTLY_USERNAME: ${{ secrets.UDC_NEXUS_USERNAME }}
          UV_INDEX_RBLN_NEXUS_NIGHTLY_PASSWORD: ${{ secrets.UDC_NEXUS_PASSWORD }}
          UV_INDEX_REBELLIONS_USERNAME: ${{ secrets.REBEL_PYPI_USERNAME }}
          UV_INDEX_REBELLIONS_PASSWORD: ${{ secrets.REBEL_PYPI_PASSWORD }}
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          retry_on: any
          shell: bash
          command: |
            if [ -z "$UV_INDEX_RBLN_NEXUS_NIGHTLY_USERNAME" ] || [ -z "$UV_INDEX_REBELLIONS_USERNAME" ]; then
              echo "::error::UDC_NEXUS_USERNAME/PASSWORD and REBEL_PYPI_USERNAME/PASSWORD secrets not available to this repo — add repo/org secrets (LDAP account)"
              exit 1
            fi
            uv sync --locked --python 3.12 --extra test --extra dev
            # rebel-compiler version override (escape hatch)
            if [ -n "${{ inputs.rebel_compiler_version }}" ]; then
              uv pip install --no-deps "rebel-compiler==${{ inputs.rebel_compiler_version }}" --extra-index-url "${{ secrets.DEV_PKG_URL }}"
            fi
            # optimum-rbln version override (escape hatch)
            if [ -n "${{ inputs.optimum_rbln_version }}" ]; then
              uv pip install --no-deps "optimum-rbln==${{ inputs.optimum_rbln_version }}"
            fi

      - name: Run pytest
        if: steps.should_skip.outputs.skip != 'true'
        env:
          REBEL_VLLM_PRE_COMPILED_DIR: ${{ secrets.VLLM_PRE_COMPILED_DIR }}

        run: |
          case "${{ matrix.test_type.name }}" in
            "openai")
              uv run --no-sync pytest tests/entrypoints/openai -vv --durations 0 --timeout=600
              ;;
            "llm")
              uv run --no-sync pytest tests/entrypoints/llm -vv --durations 0
              ;;
            "sampler")
              uv run --no-sync pytest -n auto -k "warm_up_true" tests/v1/worker/test_sampler.py -vv --durations 0
              uv run --no-sync pytest -n auto -k "warm_up_false" tests/v1/worker/test_sampler.py -vv --durations 0
              uv run --no-sync pytest -n auto -k "not warm_up_true and not warm_up_false" tests/v1/worker/test_sampler.py -vv --durations 0
              ;;
            "models")
              uv run --no-sync pytest tests/v1/models -vv --durations 0
              ;;
          esac

      - name: Skip message
        if: steps.should_skip.outputs.skip == 'true'
        run: |
          echo "Found [skip-${{ matrix.test_type.name }}] in commit message, skipping CI"