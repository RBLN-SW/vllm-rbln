name: vllm-rbln / PR / Pytest

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "ref to checkout"
        required: false
        type: string
      pr_number:
        description: "PR number to run"
        required: false
        type: string
      rebel_compiler_version:
        description: "Version of rebel-compiler to use (optional)"
        required: false
        type: string
      optimum_rbln_version:
        description: "Version of optimum-rbln to use (optional)"
        required: false
        type: string
      fail_fast:
        description: "Whether to fail fast when one matrix job fails"
        required: false
        type: boolean
        default: true
      test_level:
        description: "Test level for VLLM_RBLN_TEST_LEVEL environment variable"
        required: false
        type: string
  workflow_call:
    inputs:
      ref:
        description: "ref to checkout"
        required: false
        type: string
      fail_fast:
        description: "Whether to fail fast when one matrix job fails"
        required: false
        type: boolean
        default: true
      rebel_compiler_version:
        description: "Version of rebel-compiler to use (optional)"
        required: false
        type: string
      optimum_rbln_version:
        description: "Version of optimum-rbln to use (optional)"
        required: false
        type: string
      test_level:
        description: "Test level for VLLM_RBLN_TEST_LEVEL environment variable"
        required: false
        type: string

jobs:
  versions:
    uses: ./.github/workflows/rbln_utils_get_ci_versions.yaml

  pytest:
    name: Pytest (${{ matrix.test_type.name }}, vllm ${{ matrix.vllm_version }})
    needs: [versions]
    runs-on: ${{ matrix.test_type.runner }}
    # Dev vllm versions are partial-support; let them fail without failing the
    # overall workflow. Stable versions stay required.
    continue-on-error: ${{ contains(fromJSON(needs.versions.outputs.vllm_versions_dev), matrix.vllm_version) }}
    strategy:
      fail-fast: ${{ inputs.fail_fast }}
      matrix:
        test_type:
          [
            {
              name : "core",
              runner : "rbln-sw-k8s-general"
            },
            {
              name : "worker",
              runner : "rbln-sw-k8s-general"
            },
            {
              name : "optimum_compile",
              runner : "rbln-sw-k8s-general"
            },
          ]
        vllm_version: ${{ fromJSON(needs.versions.outputs.vllm_versions_all) }}
    steps:
      - name: Checkout the vllm-rbln repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/merge', inputs.pr_number) || (inputs.ref != '' && inputs.ref) || github.sha }}
          submodules: recursive
          fetch-depth: 0

      - name: Derive vllm-cpu index URL from matrix vllm_version
        id: parse_index_url
        run: |
          VERSION="${{ matrix.vllm_version }}"
          PUBLIC="${VERSION%%+*}"
          VLLM_CPU_URL="https://wheels.vllm.ai/${PUBLIC}/cpu"
          echo "Derived vllm-cpu URL: ${VLLM_CPU_URL}"
          echo "VLLM_CPU_URL=${VLLM_CPU_URL}" >> $GITHUB_OUTPUT

      - name: Get commit message
        id: get_commit_message
        run: |
          if git rev-parse HEAD^2 >/dev/null 2>&1; then
            COMMIT_MESSAGE=$(git log -1 --pretty=%B HEAD^2)
          else
            COMMIT_MESSAGE=$(git log -1 --pretty=%B)
          fi
          echo "Commit message: $COMMIT_MESSAGE"
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check if test should be skipped
        id: should_skip
        env:
          COMMIT_MESSAGE: ${{ steps.get_commit_message.outputs.message }}
        run: |
          SKIP=false

          case "${{ matrix.test_type.name }}" in
            "core")
              if [[ "$COMMIT_MESSAGE" == *"[skip core]"* ]]; then
                SKIP=true
              fi
              ;;
            "worker")
              if [[ "$COMMIT_MESSAGE" == *"[skip worker]"* ]]; then
                SKIP=true
              fi
              ;;
            "optimum_compile")
              if [[ "$COMMIT_MESSAGE" == *"[skip optimum_compile]"* ]]; then
                SKIP=true
              fi
              ;;
          esac

          echo "skip=$SKIP" >> $GITHUB_OUTPUT
          echo "Skip decision: $SKIP"

      - name: Set up Python 3.12
        if: steps.should_skip.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install rebel-compiler
        if: steps.should_skip.outputs.skip != 'true'
        run: |
          for i in {1..3}; do
            sudo apt-get update && break || sleep 10
          done
          sudo apt-get install -y build-essential
          python3 -m pip uninstall rebel-compiler -y
          VERSION="${{ inputs.rebel_compiler_version }}"
          if [ -z "$VERSION" ]; then
            echo "Error: rebel_compiler_version is not set"
            exit 1
          fi
          echo "rebel-compiler ${VERSION}"
          python3 -m pip install --extra-index-url ${{ secrets.DEV_PKG_URL }} rebel-compiler=="${VERSION}"

      - name: Download wheel artifact
        if: steps.should_skip.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: vllm-wheel
          path: dist

      - name: Install local vllm-rbln package and dependencies
        if: steps.should_skip.outputs.skip != 'true'
        run: |
          VLLM_CPU_URL="${{ steps.parse_index_url.outputs.VLLM_CPU_URL }}"
          VLLM_PIN="vllm==${{ matrix.vllm_version }}"
          pip install packaging setuptools wheel simphile pynvml huggingface_hub setuptools_scm fire pytest pytest-asyncio
          if [ -n "${{ inputs.optimum_rbln_version }}" ]; then
            pip install --force-reinstall --no-cache-dir dist/vllm_rbln*.whl "${VLLM_PIN}" --constraint <(echo "optimum-rbln==${{ inputs.optimum_rbln_version }}") --index-url http://pypi-cache.devpi.svc.cluster.local/root/pypi/+simple/ --extra-index-url "${VLLM_CPU_URL}" --extra-index-url https://download.pytorch.org/whl/cpu --trusted-host pypi-cache.devpi.svc.cluster.local --extra-index-url https://pypi.org/simple
            echo "optimum-rbln ${{ inputs.optimum_rbln_version }}"
          else
            pip install --force-reinstall --no-cache-dir dist/vllm_rbln*.whl "${VLLM_PIN}" --index-url http://pypi-cache.devpi.svc.cluster.local/root/pypi/+simple/ --extra-index-url "${VLLM_CPU_URL}" --extra-index-url https://download.pytorch.org/whl/cpu --trusted-host pypi-cache.devpi.svc.cluster.local --extra-index-url https://pypi.org/simple
          fi

      - name: Run pytest
        if: steps.should_skip.outputs.skip != 'true'
        env:
          REBEL_VLLM_PRE_COMPILED_DIR: ${{ secrets.VLLM_PRE_COMPILED_DIR }}

        run: |
          case "${{ matrix.test_type.name }}" in
            "core")
              pytest tests/v1/core -vv --durations 0
              ;;
            "worker")
              pytest tests/v1/worker/test_rebel_optimum_model_runner.py -vv --durations 0
              ;;
            "optimum_compile")
              pytest tests/optimum_compile -vv --durations 0
              ;;
          esac

      - name: Skip message
        if: steps.should_skip.outputs.skip == 'true'
        run: |
          echo "Found [skip-${{ matrix.test_type.name }}] in commit message, skipping CI"

  pytest-arc:
    name: Pytest (${{ matrix.test_type.name }}, vllm ${{ matrix.vllm_version }})
    needs: [versions]
    runs-on: ${{ matrix.test_type.runner }}
    # Dev vllm versions are partial-support; see pytest job for rationale.
    continue-on-error: ${{ contains(fromJSON(needs.versions.outputs.vllm_versions_dev), matrix.vllm_version) }}
    container:
      image: mcr.microsoft.com/devcontainers/python:3.12
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: ${{ inputs.fail_fast }}
      matrix:
        test_type:
          [
            {
              name : "openai",
              runner : "rbln-sw-k8s-ca22-4"
            },
            {
              name : "sampler",
              runner : "rbln-sw-k8s-ca22-1"
            },
          ]
        vllm_version: ${{ fromJSON(needs.versions.outputs.vllm_versions_all) }}
    steps:
      - name: Checkout the vllm-rbln repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/merge', inputs.pr_number) || (inputs.ref != '' && inputs.ref) || github.sha }}
          submodules: recursive
          fetch-depth: 0

      - name: Fix git ownership
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Derive vllm-cpu index URL from matrix vllm_version
        id: parse_index_url
        run: |
          VERSION="${{ matrix.vllm_version }}"
          PUBLIC="${VERSION%%+*}"
          VLLM_CPU_URL="https://wheels.vllm.ai/${PUBLIC}/cpu"
          echo "Derived vllm-cpu URL: ${VLLM_CPU_URL}"
          echo "VLLM_CPU_URL=${VLLM_CPU_URL}" >> $GITHUB_OUTPUT

      - name: Get commit message
        id: get_commit_message
        run: |
          if git rev-parse HEAD^2 >/dev/null 2>&1; then
            COMMIT_MESSAGE=$(git log -1 --pretty=%B HEAD^2)
          else
            COMMIT_MESSAGE=$(git log -1 --pretty=%B)
          fi
          echo "Commit message: $COMMIT_MESSAGE"
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check if test should be skipped
        id: should_skip
        env:
          COMMIT_MESSAGE: ${{ steps.get_commit_message.outputs.message }}
        run: |
          SKIP=false

          case "${{ matrix.test_type.name }}" in
            "openai")
              if [[ "$COMMIT_MESSAGE" == *"[skip openai]"* ]]; then
                SKIP=true
              fi
              ;;
            "sampler")
              if [[ "$COMMIT_MESSAGE" == *"[skip worker]"* ]]; then
                SKIP=true
              fi
              ;;
          esac

          echo "skip=$SKIP" >> $GITHUB_OUTPUT

      - name: Install uv CLI
        if: steps.should_skip.outputs.skip != 'true'
        run: |
          pip install uv

      - name: Install rebel-compiler
        if: steps.should_skip.outputs.skip != 'true'
        run: |
          for i in {1..3}; do
            apt-get update && break || sleep 10
          done
          apt-get install -y build-essential
          uv pip uninstall --system rebel-compiler
          VERSION="${{ inputs.rebel_compiler_version }}"
          if [ -z "$VERSION" ]; then
            echo "Error: rebel_compiler_version is not set"
            exit 1
          fi
          echo "rebel-compiler ${VERSION}"
          uv pip install --system --extra-index-url ${{ secrets.DEV_PKG_URL }} rebel-compiler=="${VERSION}"

      - name: Download wheel artifact
        if: steps.should_skip.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: vllm-wheel
          path: dist

      - name: Install local vllm-rbln package and dependencies
        if: steps.should_skip.outputs.skip != 'true'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          retry_on: any
          shell: bash
          command: |
            VLLM_CPU_URL="${{ steps.parse_index_url.outputs.VLLM_CPU_URL }}"
            VLLM_PIN="vllm==${{ matrix.vllm_version }}"
            uv pip install --system packaging setuptools wheel simphile pynvml huggingface_hub setuptools_scm fire pytest pytest-asyncio pytest-xdist
            if [ -n "${{ inputs.optimum_rbln_version }}" ]; then
              uv pip install --system --force-reinstall --no-cache-dir dist/vllm_rbln*.whl "${VLLM_PIN}" --constraint <(echo "optimum-rbln==${{ inputs.optimum_rbln_version }}") --index-url http://pypi-cache.devpi.svc.cluster.local/root/pypi/+simple/ --extra-index-url "${VLLM_CPU_URL}" --extra-index-url https://download.pytorch.org/whl/cpu  --extra-index-url https://pypi.org/simple --index-strategy unsafe-best-match
              echo "optimum-rbln ${{ inputs.optimum_rbln_version }}"
            else
              uv pip install --system --force-reinstall --no-cache-dir dist/vllm_rbln*.whl "${VLLM_PIN}" --index-url http://pypi-cache.devpi.svc.cluster.local/root/pypi/+simple/ --extra-index-url "${VLLM_CPU_URL}" --extra-index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple --index-strategy unsafe-best-match
            fi

      - name: Run pytest
        if: steps.should_skip.outputs.skip != 'true'
        env:
          REBEL_VLLM_PRE_COMPILED_DIR: ${{ secrets.VLLM_PRE_COMPILED_DIR }}

        run: |
          case "${{ matrix.test_type.name }}" in
            "openai")
              pytest tests/entrypoints/openai -vv --durations 0
              ;;
            "sampler")
              pytest -n auto -k "warm_upTrue" tests/v1/worker/test_sampler.py -vv --durations 0
              pytest -n auto -k "warm_upFalse" tests/v1/worker/test_sampler.py -vv --durations 0
              ;;
          esac

      - name: Skip message
        if: steps.should_skip.outputs.skip == 'true'
        run: |
          echo "Found [skip-${{ matrix.test_type.name }}] in commit message, skipping CI"