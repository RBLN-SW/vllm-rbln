name: Trigger FSW PR CI for vLLM-RBLN

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      ref:
        description: "ref to checkout"
        required: false
        type: string
      python_version:
        description: "Python version to use"
        required: false
        type: string
        default: "3.12.9"
      vllm_upstream_tag:
        description: "vLLM upstream tag/version to use for tests (e.g., v0.9.1)"
        required: false
        type: string

jobs:
  resolve-vllm-versions:
    if: github.repository_owner == 'RBLN-SW' && github.event_name == 'pull_request'
    runs-on: fsw-r18s-atom-ext-rbln-sw-general-c1m12
    outputs:
      versions: ${{ steps.pick.outputs.versions }}
    steps:
      - uses: actions/checkout@v4
      - id: pick
        shell: bash
        run: |
          set -euo pipefail
          versions=$(python3 -c 'import json; print(json.dumps(json.load(open(".github/vllm-test-versions.json"))["versions"]))')
          echo "::notice::vLLM versions to dispatch: $versions"
          echo "versions=$versions" >> "$GITHUB_OUTPUT"

  trigger-vllm-rbln-fsw-pr-ci:
    needs: resolve-vllm-versions
    if: github.repository_owner == 'RBLN-SW' && github.event_name == 'pull_request'
    runs-on: fsw-r18s-atom-ext-rbln-sw-general-c1m12
    strategy:
      fail-fast: false
      matrix:
        vllm_version: ${{ fromJSON(needs.resolve-vllm-versions.outputs.versions) }}
    steps:
      - name: Dispatch to fsw-integration (vllm ${{ matrix.vllm_version }})
        uses: Wandalen/wretry.action@v3
        with:
          action: peter-evans/repository-dispatch@v4
          attempt_limit: 5
          attempt_delay: 2000
          with: |
            token: ${{ secrets.GIT_PAT }}
            repository: rebellions-sw/fsw-integration
            event-type: vllm-rbln-pr-event
            client-payload: |
              {
                "ref": "${{ github.event.pull_request.head.ref }}",
                "sha": "${{ github.event.pull_request.head.sha }}",
                "pr_number": "${{ github.event.number }}",
                "actor": "${{ github.actor }}",
                "vllm_version": "${{ matrix.vllm_version }}"
              }
