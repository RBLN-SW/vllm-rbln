name: Trigger FSW Nightly E2E for vLLM-RBLN

on:
  schedule:
    # Daily 02:00 KST (17:00 UTC)
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: "vllm-rbln ref to test (branch, tag, or SHA). Defaults to dev."
        required: false
        type: string
        default: dev

jobs:
  trigger-vllm-rbln-fsw-nightly-e2e:
    if: github.repository_owner == 'RBLN-SW'
    runs-on: fsw-r18s-atom-ext-rbln-sw-general-c1m12
    strategy:
      fail-fast: false
      matrix:
        vllm_version:
          - "0.18.0+cpu"
    steps:
      - name: Compute distinct id
        id: distinct
        shell: bash
        run: |
          echo "id=nightly-e2e-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.vllm_version }}" >> "$GITHUB_OUTPUT"

      - name: Dispatch fsw-integration nightly e2e and capture run id
        id: dispatch
        uses: Codex-/return-dispatch@v2
        with:
          token: ${{ secrets.GIT_PAT }}
          ref: dev
          repo: fsw-integration
          owner: rebellions-sw
          workflow: vllm_rbln_nightly_e2e.yaml
          workflow_inputs: |
            {
              "environment": "vllm_rbln-nightly",
              "vllm_rbln_ref": "${{ inputs.ref || 'dev' }}",
              "vllm_version": "${{ matrix.vllm_version }}",
              "distinct_id": "${{ steps.distinct.outputs.id }}"
            }
          workflow_timeout_seconds: 300
          distinct_id: ${{ steps.distinct.outputs.id }}

      - name: Await fsw-integration nightly e2e completion
        uses: Codex-/await-remote-run@v1
        with:
          token: ${{ secrets.GIT_PAT }}
          repo: fsw-integration
          owner: rebellions-sw
          run_id: ${{ steps.dispatch.outputs.run_id }}
          run_timeout_seconds: 7200
          poll_interval_ms: 60000
