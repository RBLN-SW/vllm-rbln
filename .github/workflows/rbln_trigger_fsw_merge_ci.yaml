name: Trigger FSW Merge CI for vLLM-RBLN

on:
  push:
    branches: [dev, main]
    paths:
      - 'vllm_rbln/**'
      - 'tests/torch_compile/**'
      - 'pyproject.toml'
      - '.github/workflows/rbln_trigger_fsw_merge_ci.yaml'

jobs:
  trigger-vllm-rbln-fsw-merge-ci:
    if: github.repository_owner == 'RBLN-SW'
    runs-on: fsw-r18s-atom-ext-rbln-sw-general-c1m12
    strategy:
      fail-fast: false
      matrix:
        vllm_version:
          - "0.18.0+cpu"
    steps:
      - name: Compute distinct id
        id: distinct
        shell: bash
        run: |
          echo "id=merge-ci-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.vllm_version }}" >> "$GITHUB_OUTPUT"

      - name: Dispatch fsw-integration merge CI and capture run id
        id: dispatch
        uses: Codex-/return-dispatch@v2
        with:
          token: ${{ secrets.GIT_PAT }}
          ref: dev
          repo: fsw-integration
          owner: rebellions-sw
          workflow: vllm_rbln_pr_ci.yaml
          workflow_inputs: |
            {
              "vllm_rbln_ref": "${{ github.ref_name }}",
              "vllm_version": "${{ matrix.vllm_version }}",
              "distinct_id": "${{ steps.distinct.outputs.id }}"
            }
          workflow_timeout_seconds: 300
          distinct_id: ${{ steps.distinct.outputs.id }}

      - name: Await fsw-integration merge CI completion
        uses: Codex-/await-remote-run@v1
        with:
          token: ${{ secrets.GIT_PAT }}
          repo: fsw-integration
          owner: rebellions-sw
          run_id: ${{ steps.dispatch.outputs.run_id }}
          run_timeout_seconds: 7200
          poll_interval_ms: 60000
