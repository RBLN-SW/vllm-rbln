codecov:
  require_ci_to_pass: false

coverage:
  precision: 2
  round: down
  range: "0...100"
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

flags:
  type2:
    paths:
      - vllm_rbln/distributed/
      - vllm_rbln/lora/
      - vllm_rbln/model_executor/
      - vllm_rbln/triton_kernels/
      - vllm_rbln/v1
    carryforward: true
